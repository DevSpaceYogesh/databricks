name: PJMI CI Pipeline

on:
  push:
    branches:
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flake8

      - name: Lint Python files
        run: |
          echo "Running flake8 on pjmi folder..."
          flake8 pjmi --max-line-length=120

      - name: List SQL files (sanity check)
        run: |
          echo "Listing SQL files:"
          find pjmi -name "*.sql"